<div class="container-fluid py-4">

  <mat-card class="shadow-lg border-0 rounded-4">

    <!-- HEADER -->
    <mat-toolbar color="primary" class="rounded-top-4 px-4">

      <span class="fw-semibold">Gestión de Categorías</span>

      <span class="spacer"></span>

     <button mat-raised-button color="accent" (click)="crear()">
  <mat-icon>add</mat-icon>
  Nueva categoría
</button>

    </mat-toolbar>

    <!-- CONTENT -->
    <div class="p-4">

      <!-- SEARCH -->
      <mat-form-field appearance="outline" class="w-100 mb-4">
        <mat-label>Buscar categoría</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Escribe para buscar...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <!-- TABLE WRAPPER -->
      <div class="table-responsive">

        <table mat-table [dataSource]="dataSource" class="w-100 modern-table">

          <!-- ID -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let cat"> {{cat.id}} </td>
          </ng-container>

          <!-- Nombre -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let cat"> {{cat.name}} </td>
          </ng-container>

          <!-- Descripción -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Descripción </th>
            <td mat-cell *matCellDef="let cat"> {{cat.description}} </td>
          </ng-container>

          <!-- Acciones -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>

            <td mat-cell *matCellDef="let cat" class="text-center">

            <button
  mat-icon-button
  color="primary"
  class="me-1 action-btn"
  (click)="editar(cat.id)">
  <mat-icon>edit</mat-icon>
</button>

            <button
  mat-icon-button
  color="warn"
  class="action-btn"
  (click)="eliminar(cat.id)">
  <mat-icon>delete</mat-icon>
</button>

            </td>
          </ng-container>

          <!-- HEADER -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

          <!-- ROWS -->
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

        </table>

      </div>

    </div>

  </mat-card>

</div>
