<header class="header">

  <div class="logo">

    SIS VENTAS 360

  </div>

  <div class="user-box">

    <img
      [src]="photoUrl"
      class="photo-user">

    <div class="user-info">

      <span class="name">
        {{ user?.name }}
      </span>

      <span class="role">
        Administrador
      </span>

    </div>

    <button
      class="btn-logout"
      (click)="logout()">

      Salir

    </button>

  </div>

</header>
